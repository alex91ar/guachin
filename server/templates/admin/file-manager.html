{% extends "base.html" %}
{% include "urls.html" %}

{% block content %}

<link rel="stylesheet" href="{{ url_for('static', filename='css/file_manager_agents.css') }}">

<div class="file-manager-page">
    <div class="file-manager-header">
        <div>
            <h1>File Manager</h1>
            <div class="topbar">
                <span class="topbar-label">Current path:</span>
                <span id="current-path" class="current-path"></span>
            </div>
        </div>
        <div class="flash" id="status-message">Loading files...</div>
    </div>

    <div class="actions-card">
        <form id="upload-form" class="action-form" action="#" method="post" enctype="multipart/form-data">
            <label class="file-input-label">
                <input type="file" name="file">
                <span>Select file</span>
            </label>
            <button type="submit" class="btn btn-primary">Upload</button>
        </form>

        <div class="actions-divider"></div>

        <form id="create-folder-form" class="action-form" action="#" method="post">
            <input type="text" name="folder_name" placeholder="New folder name" class="text-input">
            <button type="submit" class="btn btn-success">Create Folder</button>
        </form>
    </div>

    <div class="table-card">
        <table class="file-table">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Type</th>
                    <th>Size</th>
                    <th class="actions-col">Action</th>
                </tr>
            </thead>
            <tbody id="file-table-body">
                <tr>
                    <td colspan="4" class="muted">Loading...</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<script src="{{ url_for('static', filename='js/file_manager.js') }}"></script>

{% endblock %}
