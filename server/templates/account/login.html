{% extends "base.html" %}
{% block content %}
<body class="page-login">
<script defer src="{{ url_for('static', filename='js/login.js') }}"></script>
<script defer src="{{ url_for('static', filename='js/passkey_login.js') }}"></script>

<section class="auth-wrap">
  <div class="auth-card">
    <h2>Welcome back</h2>
    <p class="meta">Sign in to continue.</p>

    <div id="error-box" class="error-box hidden"></div>

    <form id="login-form" class="stack">
      <label>
        <span>Username</span>
        <input type="text" name="id" required autocomplete="username" />
      </label>
      <label>
        <span>Password</span>
        <input type="password" name="password" required autocomplete="current-password" />
      </label>
      <button type="submit" class="btn primary w-100">Login</button>
      <p class="meta">
        <a href="javascript:void(0)" id="forgot-link" class="forgot-link">Forgot your password?</a>
      </p>
      <button type="button" id="passkey-login-btn" class="btn subtle w-100">
        Use passkey
      </button>
    </form>
  </div>
</section>

<!-- 2FA Modal -->

<div class="modal-backdrop hidden" id="twofa-modal" hidden>
  <div class="modal">
    <header>
    <h3>Two-Factor Authentication</h3>
    <button class="icon-btn" data-close="twofa-modal" aria-label="Close">✖</button>
    </header>
    <form id="twofa-form">
      <label>
        <span>Enter your 2FA code below:</span>
        <input
          type="text"
          id="twofa-code"
          name="twofa-code"
          inputmode="numeric"
          maxlength="6"
          pattern="[0-9]{6}"
          placeholder="123456"
          required
        />
      </label>
      <footer class="modal-actions">
        <button id="twofa-cancel" type="button" class="btn subtle" data-close="twofa-modal">Cancel</button>
        <button id="twofa-submit" type="submit" class="btn primary">Confirm</button>
      </footer>
    </form>
  </div>
</div>

<!-- Forgot Password Modal -->
<div class="modal-backdrop hidden" id="forgot-modal" hidden>
  <div class="modal">
    <header>
      <h3>Reset your password</h3>
      <button class="icon-btn" data-close="forgot-modal" aria-label="Close">✖</button>
    </header>
    <form id="forgot-form">
      <label>
        <span>Username or Email</span>
        <input
          type="text"
          id="forgot-identifier"
          name="identifier"
          placeholder="your.username or you@example.com"
          required
        />
      </label>
      <p class="meta">We’ll send a reset link if the account exists.</p>
      <footer class="modal-actions">
        <button type="button" class="btn subtle" data-close="forgot-modal">Cancel</button>
        <button type="submit" class="btn primary">Send reset link</button>
      </footer>
    </form>
  </div>
</div>

<p id="result" class="meta"></p>



<!-- Toast container -->
</body>
{% endblock %}
