{% extends "base.html" %}
{% block title %}Create Account — Guachin{% endblock %}
{% block content %}
<body class="page-login">
<section class="auth-wrap">
  <div class="auth-card">
    <h2>Create Account</h2>
    <p class="meta">Join Guachin and start selling instantly.</p>

    <form id="signup-form" class="stack">
      <label>
        <span>Username</span>
        <input type="text" name="id" required autocomplete="username" placeholder="Enter your username">
      </label>

      <label>
        <span>Email</span>
        <input type="email" name="email" required autocomplete="email" placeholder="you@example.com">
      </label>

      <label>
        <span>Password</span>
        <input type="password" name="password" required autocomplete="new-password" placeholder="Create a password">
      </label>

      <label>
        <span>Confirm Password</span>
        <input type="password" name="confirm_password" required autocomplete="new-password" placeholder="Re-enter your password">
      </label>

      <button class="btn primary w-100" type="submit">Sign Up</button>
      <p id="signup-error" class="meta" style="color:#ff4d4d;display:none;"></p>
    </form>

    <p class="meta">
      Already have an account? 
      <a href="javascript:window.location=window.login_page_HTML" style="color:var(--accent-light);text-decoration:none;">Log in</a>
    </p>
  </div>
</section>

<script defer src="{{ url_for('static', filename='js/signup.js') }}"></script>
</body>
{% endblock %}
